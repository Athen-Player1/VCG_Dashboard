services:
  web:
    image: ${WEB_IMAGE:-ghcr.io/athen-player1/vgc-dashboard-web:latest}
    pull_policy: always
    ports:
      - "3000:3000"
    environment:
      API_BASE_URL: http://api:8000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - api

  api:
    image: ${API_IMAGE:-ghcr.io/athen-player1/vgc-dashboard-api:latest}
    pull_policy: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/vgc_dashboard
      SHOWDOWN_ENGINE_URL: http://showdown-engine:3100
    depends_on:
      - db
      - showdown-engine

  worker:
    image: ${WORKER_IMAGE:-ghcr.io/athen-player1/vgc-dashboard-worker:latest}
    pull_policy: always
    command: python -m app.sim_worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/vgc_dashboard
      SHOWDOWN_ENGINE_URL: http://showdown-engine:3100
    depends_on:
      - db
      - showdown-engine

  showdown-engine:
    image: ${SIM_ENGINE_IMAGE:-ghcr.io/athen-player1/vgc-dashboard-sim-engine:latest}
    pull_policy: always

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vgc_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
