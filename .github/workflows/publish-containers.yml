name: Publish Containers

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/vgc-dashboard-web
          - service: api
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/vgc-dashboard-api
          - service: worker
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/vgc-dashboard-worker
          - service: showdown-engine
            context: ./showdown-engine
            dockerfile: ./showdown-engine/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/vgc-dashboard-showdown-engine

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
